

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: cadence_user
      POSTGRES_PASSWORD: cadence_pass
      POSTGRES_DB: sales_cadence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cadence_user -d sales_cadence"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy

  # 3 SEPARATE WORKERS — this is the key learning point
  # Each handles a different queue, can scale independently
  worker_calls:
    build: ./backend
    command: celery -A app.workers.celery_app worker -Q calls -c 4 --loglevel=info -n calls@%h
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    depends_on: [redis, postgres]

  worker_emails:
    build: ./backend
    command: celery -A app.workers.celery_app worker -Q emails -c 2 --loglevel=info -n emails@%h
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    depends_on: [redis, postgres]

  worker_cadence:
    build: ./backend
    command: celery -A app.workers.celery_app worker -Q cadence -c 2 --loglevel=info -n cadence@%h
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
    depends_on: [redis, postgres]

  # Flower = visual Celery monitor. Visit http://localhost:5555
  flower:
    build: ./backend
    command: celery -A app.workers.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file: ./backend/.env
    depends_on: [redis]

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # browser must use localhost to reach backend container
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend/frontend:/app/frontend
      - /app/frontend/node_modules

volumes:
  postgres_data: